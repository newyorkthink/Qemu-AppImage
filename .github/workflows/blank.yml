name: QEMU Jammy CI

on:
  schedule:
    - cron: "0 0 */6 * *"
  push:
    branches: [main]
    paths-ignore: ['**/README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**/README.md']
  workflow_dispatch:

concurrency:
  group: qemu-jammy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build QEMU AppImage
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            bison \
            build-essential \
            ca-certificates \
            desktop-file-utils \
            docutils-common \
            flex \
            gettext \
            git \
            libcbor-dev \
            libaio-dev \
            libaio1 \
            libasound2-dev \
            libbluetooth-dev \
            libbrlapi-dev \
            libbz2-dev \
            libcap-ng-dev \
            libcapstone-dev \
            libcurl4-gnutls-dev \
            libepoxy-dev \
            libfdt-dev \
            libglib2.0-dev \
            libgmp-dev \
            libgtk-3-dev \
            libibverbs-dev \
            libiconv-hook-dev \
            libidn2-dev \
            libiscsi-dev \
            libiscsi7 \
            libjpeg8-dev \
            liblz4-dev \
            liblzo2-dev \
            libncurses5-dev \
            libnfs-dev \
            libnuma-dev \
            libp11-kit-dev \
            libpciaccess-dev \
            libpciaccess0 \
            libpixman-1-0 \
            libpixman-1-dev \
            librados-dev \
            librbd-dev \
            librdmacm-dev \
            libsasl2-dev \
            libsdl2-dev \
            libseccomp-dev \
            libslirp-dev \
            libslirp0 \
            libsnappy-dev \
            libspice-protocol-dev \
            libspice-server-dev \
            libspice-server1 \
            libssh-dev \
            libtasn1-6-dev \
            libunistring-dev \
            liburing-dev \
            libusb-1.0-0-dev \
            libusbredirhost-dev \
            libvde-dev \
            libvdeplug-dev \
            libvirglrenderer-dev \
            libvirglrenderer1 \
            libvte-2.91-dev \
            libxen-dev \
            libxml2-dev \
            libxml2-utils \
            libyajl-dev \
            libyajl2 \
            libzstd-dev \
            libzstd1 \
            nettle-dev \
            ninja-build \
            pkg-config \
            python3-pip \
            python3-venv \
            valgrind \
            wget \
            xfslibs-dev \
            xsltproc \
            xz-utils \
            zlib1g-dev

          python3 -m venv "${GITHUB_WORKSPACE}/.venv"
          source "${GITHUB_WORKSPACE}/.venv/bin/activate"
          python -m pip install --upgrade pip meson packaging
          MESON="$(command -v meson)"

          wget -q https://www.gnupg.org/ftp/gcrypt/gnutls/v3.7/gnutls-3.7.11.tar.xz
          tar -xf gnutls-3.7.11.tar.xz
          pushd gnutls-3.7.11
          ./configure
          make -j"$(nproc)"
          sudo make install
          popd
          pkg-config --modversion gnutls

          wget -q https://download.gnome.org/sources/glib/2.80/glib-2.80.2.tar.xz
          tar -xf glib-2.80.2.tar.xz
          "${MESON}" setup glib-2.80.2/_build glib-2.80.2
          "${MESON}" compile -C glib-2.80.2/_build
          sudo "${MESON}" install -C glib-2.80.2/_build

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          wget -q https://github.com/VHSgunzo/uruntime/releases/download/v0.3.9/uruntime-appimage-dwarfs-x86_64 -O uruntime
          chmod +x linuxdeploy uruntime

          # Build libunionpreload from a pinned upstream source revision instead
          # of storing and trusting an opaque precompiled shared object.
          LIBUNIONPRELOAD_COMMIT=bd1fc4a17ddac6ab999b741d3d16e930862a3d98
          wget -q \
            "https://raw.githubusercontent.com/project-portable/libunionpreload/${LIBUNIONPRELOAD_COMMIT}/libunionpreload.c" \
            -O libunionpreload.c
          gcc -shared -fPIC libunionpreload.c -o libunionpreload.so \
            -ldl -DUNION_LIBNAME='"libunionpreload.so"'
          strip libunionpreload.so

          APPDIR="${GITHUB_WORKSPACE}/lucas"
          mkdir -p "${APPDIR}/usr/lib" "${APPDIR}/usr/share"
          cp -a /usr/share/mime "${APPDIR}/usr/share/"

          git clone --depth 1 --recursive https://gitlab.com/qemu-project/qemu.git qemu
          pushd qemu
          ./configure \
            --disable-docs \
            --enable-alsa \
            --enable-gio \
            --enable-gnutls \
            --enable-gtk \
            --enable-guest-agent \
            --enable-kvm \
            --enable-libssh \
            --enable-libudev \
            --enable-libusb \
            --enable-modules \
            --enable-nettle \
            --enable-opengl \
            --enable-pa \
            --enable-pixman \
            --enable-sdl \
            --enable-slirp \
            --enable-slirp-smbd \
            --enable-spice \
            --enable-spice-protocol \
            --enable-system \
            --enable-user \
            --enable-virglrenderer \
            --enable-usb-redir \
            --prefix="${APPDIR}/usr"
          make -j"$(nproc)"
          make install
          QEMU_VERSION="$(git describe --tags --always | tr '/' '-')"
          popd

          cp -f AppRun "${APPDIR}/AppRun.real"
          cp -f AppRun.wrapper "${APPDIR}/AppRun"
          cp -f qemu.desktop qemu_logo_no_text.svg libunionpreload.so "${APPDIR}/"
          chmod +x "${APPDIR}/AppRun" "${APPDIR}/AppRun.real"

          ./linuxdeploy --appdir "${APPDIR}"
          find "${APPDIR}" -depth -name 'libglib-2.0.so.0' -type f -delete
          find "${APPDIR}/usr/bin" "${APPDIR}/usr/libexec" -type f -exec strip --strip-unneeded {} + 2>/dev/null || true

          ARCH=x86_64 ./uruntime \
            --appimage-mkdwarfs \
            -f \
            --set-owner 0 \
            --set-group 0 \
            --no-history \
            --no-create-timestamp \
            --compression zstd:level=22 \
            -S26 \
            -B8 \
            --header uruntime \
            -i "${APPDIR}" \
            -o "QEMU-${QEMU_VERSION}-x86_64.AppImage"

          mkdir -p dist
          mv ./*.AppImage* dist/

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-jammy
          path: dist/*.AppImage*
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: continuous-stable-jammy

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: QEMU-jammy

      - name: Replace continuous release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Continuous build jammy
          tag_name: continuous-stable-jammy
          prerelease: false
          draft: false
          generate_release_notes: false
          make_latest: true
          files: '*.AppImage*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
