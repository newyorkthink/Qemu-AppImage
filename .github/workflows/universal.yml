name: QEMU Package CI

on:
  schedule:
    - cron: "0 0 */6 * *"
  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

concurrency:
  group: qemu-package-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package official QEMU build
        shell: bash
        run: |
          set -euo pipefail
          chmod +x qemu-universal.sh
          ./qemu-universal.sh
          mkdir -p dist
          mv ./*.AppImage* dist/

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-package
          path: dist/*.AppImage*
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: QEMU-package

      - name: Replace continuous release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: continuous-universal
        run: |
          gh release delete "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --cleanup-tag -y || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Continuous universal
          tag_name: continuous-universal
          prerelease: false
          draft: false
          generate_release_notes: false
          make_latest: true
          files: "*.AppImage*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
